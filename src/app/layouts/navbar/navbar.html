<body>
  <nav class="navbar navbar-expand-lg fixed-top shadow">
    <div class="container">

      <!-- LEFT: Name -->
      <a class="navbar-brand" routerLink="">{{ navBarBrand }}</a>

      <!-- Mobile Toggle -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- RIGHT: Menu -->
      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <ul class="navbar-nav">
          @for (item of navItemsList; track $index) {
          <li class="{{item.liClass}}">
            <a class="{{item.aClass}} {{item.isActive ? 'active' : ''}}" routerLink="{{item.routerLink}}"
              (click)="onActive(item)">
              {{item.text}}
            </a>
          </li>
          }
        </ul>
      </div>

    </div>
  </nav>
</body>
